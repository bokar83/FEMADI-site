          - label: "Activité 2 — Titre (EN)"
            name: "en.activities.1.title"
            widget: "string"
          - label: "Activité 2 — Description (FR)"
            name: "fr.activities.1.body"
            widget: "text"
          - label: "Activité 2 — Description (EN)"
