          - label: "Activité 3 — Titre (FR)"
            name: "fr.activities.2.title"
            widget: "string"
          - label: "Activité 3 — Titre (EN)"
            name: "en.activities.2.title"
            widget: "string"
          - label: "Activité 3 — Description (FR)"
            name: "fr.activities.2.body"
            widget: "text"
          - label: "Activité 3 — Description (EN)"
            name: "en.activities.2.body"
            widget: "text"
          - label: "Activité 4 — Titre (FR)"
