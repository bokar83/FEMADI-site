# admin/config.yml

backend:
  name: github
  repo: bokar83/FEMADI-site
  branch: main
  base_url: https://sveltia-oauth.bokar83.workers.dev

locale: fr
site_url: https://femadi.com
display_url: https://femadi.com
logo_url: https://femadi.com/assets/logo.png

media_folder: "assets"
public_folder: "assets"

publish_mode: editorial_workflow

collections:
  - name: "site"
    label: "Paramètres du site"
    files:
      - name: "settings"
        label: "Contact & Frais d'adhésion"
        file: "_data/site.json"
        format: json
        fields:
          - label: "Numéro de téléphone"
            name: "phone"
            widget: "string"
          - label: "Numéro WhatsApp"
            name: "whatsapp"
            widget: "string"
          - label: "Email"
            name: "email"
            widget: "string"
          - label: "Adhésion individuelle (GNF)"
            name: "fee_individual_gnf"
            widget: "string"
            hint: "ex: 200 000"
          - label: "Adhésion personne morale (GNF)"
            name: "fee_org_gnf"
            widget: "string"
            hint: "ex: 1 500 000"
          - label: "Adhésion bienfaiteur (GNF)"
            name: "fee_patron_gnf"
            widget: "string"
            hint: "ex: 5 000 000"

  - name: "content"
    label: "Contenu du site"
    files:
      - name: "content"
        label: "Textes (FR/EN)"
        file: "_data/content.json"
        format: json
        fields:
          # ── HÉRO ──────────────────────────────────────────────────────────
          - label: "Héro — Titre (FR)"
            name: "fr.hero_h1"
            widget: "string"
          - label: "Héro — Titre (EN)"
            name: "en.hero_h1"
            widget: "string"
          - label: "Héro — Texte d'accroche (FR)"
            name: "fr.hero_lead"
            widget: "text"
          - label: "Héro — Texte d'accroche (EN)"
            name: "en.hero_lead"
            widget: "text"
          - label: "Héro — Bouton CTA (FR)"
            name: "fr.hero_cta"
            widget: "string"
          - label: "Héro — Bouton CTA (EN)"
            name: "en.hero_cta"
            widget: "string"

          # ── MISSION ───────────────────────────────────────────────────────
          - label: "Mission — Titre (FR)"
            name: "fr.mission_heading"
            widget: "string"
          - label: "Mission — Titre (EN)"
            name: "en.mission_heading"
            widget: "string"
          - label: "Mission — Texte (FR)"
            name: "fr.mission_text"
            widget: "text"
          - label: "Mission — Texte (EN)"
            name: "en.mission_text"
            widget: "text"

          # ── OBJECTIFS ─────────────────────────────────────────────────────
          - label: "Objectifs — Titre (FR)"
            name: "fr.objectives_heading"
            widget: "string"
          - label: "Objectifs — Titre (EN)"
            name: "en.objectives_heading"
            widget: "string"
          - label: "Objectif 1 (FR)"
            name: "fr.objectives.0"
            widget: "string"
          - label: "Objectif 1 (EN)"
            name: "en.objectives.0"
            widget: "string"
          - label: "Objectif 2 (FR)"
            name: "fr.objectives.1"
            widget: "string"
          - label: "Objectif 2 (EN)"
            name: "en.objectives.1"
            widget: "string"
          - label: "Objectif 3 (FR)"
            name: "fr.objectives.2"
            widget: "string"
          - label: "Objectif 3 (EN)"
            name: "en.objectives.2"
            widget: "string"
          - label: "Objectif 4 (FR)"
            name: "fr.objectives.3"
            widget: "string"
          - label: "Objectif 4 (EN)"
            name: "en.objectives.3"
            widget: "string"
          - label: "Objectif 5 (FR)"
            name: "fr.objectives.4"
            widget: "string"
          - label: "Objectif 5 (EN)"
            name: "en.objectives.4"
            widget: "string"

          # ── ACTIVITÉS ─────────────────────────────────────────────────────
          - label: "Activités — Titre (FR)"
            name: "fr.activities_heading"
            widget: "string"
          - label: "Activités — Titre (EN)"
            name: "en.activities_heading"
            widget: "string"
          - label: "Activité 1 — Titre (FR)"
            name: "fr.activities.0.title"
            widget: "string"
          - label: "Activité 1 — Titre (EN)"
            name: "en.activities.0.title"
            widget: "string"
          - label: "Activité 1 — Description (FR)"
            name: "fr.activities.0.body"
