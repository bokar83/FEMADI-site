          - label: "Adhésion — Titre (EN)"
            name: "en.membership_heading"
            widget: "string"
          - label: "Adhésion — Description (FR)"
            name: "fr.membership_desc"
            widget: "text"
          - label: "Adhésion — Description (EN)"
            name: "en.membership_desc"
            widget: "text"
          - label: "Adhésion — Bouton soutien (FR)"
            name: "fr.membership_btn_support"
